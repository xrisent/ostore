<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OStore</title>
    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-left">
          <div class="burger">
            <a href="/about/about.html">О нас</a>
          </div>
          <button class="burger-btn">Бургер</button>
          <img src="https://ostore.kg/_nuxt/logo.nDmPZ4Rs.svg" alt="" />
        </div>
        <input type="text" placeholder="Найти" />
        <div class="cart">Корзина</div>
      </div>
    </header>
    <main>
      <div class="container">
        <section class="cards">
          <div class="card">
            <div class="badge">Новинка</div>
            <img src="http://localhost:3000/phone.png" alt="" />
            <div class="info">
              <h2>Honor X8c 8/128 Black</h2>
              <div class="price">
                <div class="oldPrice">22 490</div>
                <div class="newPrice">22 090</div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
